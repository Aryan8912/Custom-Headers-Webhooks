services:
  - type: web
    name: bolna-webhook-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bolna-webhooks
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: bolna-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: X_API_KEY
        sync: false
      - key: BOLNA_API_KEY
        sync: false
      - key: BOLNA_WEBHOOK_SECRET
        sync: false
      - key: BOLNA_SENDER_IP
        value: 13.203.39.153
      - key: ALLOWED_TENANT_IDS
        value: tenant_a

  - type: web
    name: bolna-webhook-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: bolna-webhook-api
          type: web
          property: host