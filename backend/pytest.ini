[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*

[pytest:env]
TESTING=true
APP_ENV=testing
DATABASE_URL=sqlite+aiosqlite:///:memory:
REDIS_URL=redis://localhost:6379/0
SECRET_KEY=test-secret-key-for-pytest-only
BOLNA_API_KEY=test-bolna-api-key
BOLNA_WEBHOOK_SECRET=test-webhook-secret
X_API_KEY=test-x-api-key
ALLOWED_TENANT_IDS=tenant_a,tenant_b

addopts = --cov=app --cov-report=term-missing -q